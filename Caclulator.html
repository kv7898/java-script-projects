<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background-color: rgb(0, 0, 0);
       }
    .cal-container {
        background-color: rgb(49, 51, 65);
        margin: 20% auto;
        width:20%;
        border: 1px solid #ccc;
        border-radius: 10px;
        box-shadow: 0px 8px 9px 0px rgba(239, 242, 246, 0.2);
    }
    .input-box {
         margin: 19px 0 12px;
         position: relative;
         text-align: center;
         }
     .myinput {
      
        box-sizing: border-box;
        width: 90%;
        padding: 25px 20px;
        outline: none;
        border: none;
        border-radius: 5px;
        font-size: 30px;
        background-color: rgb(137, 134, 156);
        color: white;
        text-align: right;
        user-select: none;
    }
    .btn-container{
        width: 100%;
        text-align: center;
  }
    .btn {
      margin: 6px 6px 12px 6px; ;
      width: 50px;
      height: 50px;
      color: rgb(95, 215, 192);
      background-color: rgb(49, 51, 65);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: -2px -2px 7px 0px rgba(255, 255, 255, 0.2);
      font-size: 18px;
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
       -webkit-appearance: none;
        margin: 0;
}
button {
  -webkit-tap-highlight-color: transparent; /* or rgba(0, 0, 0, 0) */
  transition-behavior: -1;
  outline: none;
}
input::placeholder{
  color: white;
}
  @media only screen and (max-width:750px) {
    .cal-container{
        width: 50%;
    }
    .myinput{
        width: 86%;
    }
  }
</style>
 </head>
 <body>
     <div class="cal-container">
      <div class="input-box">
        <input id="myinput" class="myinput" type="text" placeholder="0" >
      </div>
      <div class="btn-container">
        <button id="clear" class="btn">AC</button>
        <button id="backspace"class="btn">DE</button>
        <button id="dot"class="btn">.</button>
        <button id="divide"class="btn">/</button>
        <button id="seven" class="btn">7</button>
        <button id="eight"class="btn">8</button>
        <button id="nine" class="btn">9</button>
        <button id="multiply"class="btn">&times;</button>
        <button id="four"class="btn">4</button>
        <button id="five"class="btn">5</button>
        <button id="six"class="btn">6</button>
        <button id="minus" class="btn">-</button>
        <button id="one" class="btn">1</button>
        <button id="two"class="btn">2</button>
        <button id="three"class="btn">3</button>
        <button id="plus"class="btn">+</button>
        <button id="dblzero"class="btn">00</button>
        <button id="zero" class="btn">0</button>
        <button id="percent"class="btn">%</button>
        <button id="equal" class="btn">=</button>
        </div>
    </div>
    <script type="text/javascript">
    let inputField= document.getElementById("myinput");
    const btnOne= document.getElementById("one");
    const btnTwo= document.getElementById("two");
    const btnThree= document.getElementById("three");
    const btnFour= document.getElementById("four");
    const btnFive= document.getElementById("five");
    const btnSix= document.getElementById("six");
    const btnSeven= document.getElementById("seven");
    const btnEight= document.getElementById("eight");
    const btnNine= document.getElementById("nine");
    const btnZero= document.getElementById("zero");
    const btnPlus= document.getElementById("plus");
    const btnMinus= document.getElementById("minus");
    const btnMultiply= document.getElementById("multiply");
    const btnDivide= document.getElementById("divide");
    const btnEqual= document.getElementById("equal");
    const btnClear= document.getElementById("clear");
    const btnDot= document.getElementById("dot");
    const btnBack= document.getElementById("backspace");
    const btnPercent= document.getElementById("percent");
    const btndblzero= document.getElementById("dblzero");
    btnOne.addEventListener("click", () => {
        inputField.value += "1"; // Append "1" to the existing value
    });
    btnTwo.addEventListener("click", () => {
        inputField.value += "2"; // Append "2" to the existing value
    });
    btnThree.addEventListener("click", () => {
        inputField.value += "3"; // Append "3" to the existing value
    });
    btnFour.addEventListener("click", () => {
        inputField.value += "4"; // Append "4" to the existing value
    });
    btnFive.addEventListener("click", () => {
        inputField.value += "5"; // Append "5" to the existing value
    });
    btnSix.addEventListener("click", () => {
        inputField.value += "6"; // Append "6" to the existing value
    });
    btnSeven.addEventListener("click", () => {
        inputField.value += "7"; // Append "7" to the existing value
    });
    btnEight.addEventListener("click", () => {
        inputField.value += "8"; // Append "8" to the existing value
    });
    btnNine.addEventListener("click", () => {
        inputField.value += "9"; // Append "9" to the existing value
    });
    btnZero.addEventListener("click", () => {
        inputField.value += "0"; // Append "0" to the existing value
    });
    btnClear.addEventListener("click", () => {
        inputField.value = ""; // Clear the input field
    }); 
    btnPlus.addEventListener("click", () => {
        inputField.value += "+"; // Append "+" to the existing value
    } );
    btnMinus.addEventListener("click", () => {
        inputField.value += "-"; // Append "-" to the existing value
    });
    btnMultiply.addEventListener("click", () => {
        inputField.value += "*"; // Append "*" to the existing value
    });
    btndblzero.addEventListener("click", () => {
        inputField.value += "00"; // Append "00" to the existing value
    });
    btnEqual.addEventListener("click", () => {
        try {
            // Validate and evaluate the expression
            let expression = inputField.value;
            let result = eval(expression); // Evaluate the mathematical expression
            inputField.value = result; // Display the result in the input field
        } catch (error) {
            inputField.value = "Syntax Error"; // Display "Error" if the expression is invalid
        }
    });
    btnDivide.addEventListener("click", () => {
        inputField.value += "/"; // Append "/" to the existing value
    });
    btnDot.addEventListener("click", () => {
        inputField.value += "."; // Append "." to the existing value
    });
    btnBack.addEventListener("click", () => {
        // Handle backspace to remove the last character
        inputField.value = inputField.value.slice(0, -1);
    });
    btnPercent.addEventListener("click", () => {
        // Append "%" to the existing value
        inputField.value += "%"; 
    });
    // Add event listener for keyboard input
    document.addEventListener("keydown", (event) => {
        // Check if the key is a number, operator, or special key
        if (!isNaN(event.key)) {
            // If the key is a number, append it to the input field
            inputField.value += event.key;
        } else if (["+", "-", "*", "/", "."].includes(event.key)) {
            // If the key is an operator or dot, append it to the input field
            inputField.value += event.key;
        } else if (event.key === "Backspace") {
            // Handle backspace to remove the last character
            inputField.value = inputField.value.slice(0, -1);
        } else if (event.key === "Enter" || event.key === "=") {
            // Handle Enter or "=" to evaluate the expression
            try {
                 expression = inputField.value;
                 result = eval(expression); // Evaluate the mathematical expression
                inputField.value = result  // Display the result in the input field
            } catch (error) {
                inputField.value = "Syntax Error"; // Display "Error" if the expression is invalid
            }
        } else if (event.key === "Escape") {
            // Handle Escape key to clear the input field
            inputField.value = "";
        }
    });
    
    
    </script>
<body>
</html>
